<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090d28"/>
      <stop offset="0.55" stop-color="#0c1640"/>
      <stop offset="1" stop-color="#0a1330"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#1b2a6b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0c1640" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f6e7b4"/>
      <stop offset="0.5" stop-color="#e3b452"/>
      <stop offset="1" stop-color="#c8923a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff7e0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <g id="spark">
      <path d="M0,-7 C0.6,-1.4 1.4,-0.6 7,0 C1.4,0.6 0.6,1.4 0,7 C-0.6,1.4 -1.4,0.6 -7,0 C-1.4,-0.6 -0.6,-1.4 0,-7 Z" fill="#f4e3ac"/>
    </g>
  </defs>

  <!-- background -->
  <rect width="1200" height="360" rx="14" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="14" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="358" rx="13" fill="none" stroke="#e3b452" stroke-opacity="0.16"/>

  <!-- faint orbital arc, right side -->
  <path d="M 1180 40 A 360 360 0 0 0 760 330" stroke="#e3b452" stroke-opacity="0.20" stroke-width="1.4" fill="none"/>
  <path d="M 1190 110 A 280 280 0 0 0 905 345" stroke="#e3b452" stroke-opacity="0.12" stroke-width="1" fill="none"/>

  <!-- twinkling stars (dots) -->
  <g fill="#cfd6f5">
    <circle cx="150" cy="60" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="40" r="1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="70" r="1.2"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.6s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="55" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" begin="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="120" r="1" ><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="860" cy="300" r="1.2"><animate attributeName="opacity" values="0.15;1;0.15" dur="3.3s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="250" r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.7s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="320" r="1"  ><animate attributeName="opacity" values="0.15;0.85;0.15" dur="3.0s" begin="1.7s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="320" r="1.1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" begin="0.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- twinkling sparkles (4-point) -->
  <g>
    <use href="#spark" transform="translate(1040,210) scale(0.9)"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.4s" begin="0.2s" repeatCount="indefinite"/></use>
    <use href="#spark" transform="translate(905,90) scale(0.7)"><animate attributeName="opacity" values="0.2;0.95;0.2" dur="2.8s" begin="1.2s" repeatCount="indefinite"/></use>
    <use href="#spark" transform="translate(760,200) scale(0.55)"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.1s" begin="0.7s" repeatCount="indefinite"/></use>
    <use href="#spark" transform="translate(1150,330) scale(0.8)"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.6s" begin="1.5s" repeatCount="indefinite"/></use>
  </g>

  <!-- shooting star -->
  <g>
    <g opacity="0">
      <line x1="0" y1="0" x2="46" y2="20" stroke="url(#shine)" stroke-width="2"/>
      <circle cx="0" cy="0" r="2" fill="#fff7e0"/>
      <animateMotion path="M 1120 30 L 720 210" dur="6s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.75;1" dur="6s" begin="2s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- vertical editorial label -->
  <text x="34" y="300" transform="rotate(-90 34 300)" fill="#e3b452" fill-opacity="0.55" font-size="13" letter-spacing="5">EDITORIAL · 2026</text>

  <!-- title -->
  <text x="80" y="170" font-size="64" font-weight="700" letter-spacing="1" fill="url(#gold)">JOÃO VILELA</text>
  <!-- shimmer sweep over title -->
  <text x="80" y="170" font-size="64" font-weight="700" letter-spacing="1" fill="url(#shine)" opacity="0.0">JOÃO VILELA
    <animate attributeName="opacity" values="0;0.55;0" keyTimes="0;0.5;1" dur="5s" begin="1s" repeatCount="indefinite"/>
  </text>

  <!-- gold rule -->
  <line x1="84" y1="196" x2="84" y2="196" stroke="url(#gold)" stroke-width="2.5">
    <animate attributeName="x2" from="84" to="360" dur="1.1s" begin="0.3s" fill="freeze"/>
  </line>

  <!-- subtitle -->
  <text x="86" y="232" font-size="18" letter-spacing="4" fill="#cdd3e8">FULL-STACK · SAAS · AI SYSTEMS</text>

  <!-- numbered nav -->
  <g font-size="16" letter-spacing="2">
    <text x="86"  y="300" fill="#e3b452" font-weight="700">01</text>
    <text x="120" y="300" fill="#aeb6d8">ABOUT</text>
    <text x="250" y="300" fill="#e3b452" font-weight="700">02</text>
    <text x="284" y="300" fill="#aeb6d8">STACK</text>
    <text x="410" y="300" fill="#e3b452" font-weight="700">03</text>
    <text x="444" y="300" fill="#aeb6d8">WORK</text>
    <rect x="600" y="288" width="9" height="16" fill="#e3b452">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
